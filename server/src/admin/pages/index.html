<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>灵珠手作 - 管理后台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50" x-data="app()">
  <!-- 登录页 -->
  <div x-show="!token" class="min-h-screen flex items-center justify-center bg-gray-100">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-sm mx-4">
      <h1 class="text-2xl font-bold text-center text-gray-800 mb-2">灵珠手作</h1>
      <p class="text-sm text-gray-400 text-center mb-6">管理后台</p>
      <form @submit.prevent="login">
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-600 mb-1.5">管理密码</label>
          <input type="password" x-model="password" placeholder="请输入密码"
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none"
            required>
        </div>
        <p x-show="error" class="text-red-500 text-sm mb-3" x-text="error"></p>
        <button type="submit" :disabled="loading"
          class="w-full bg-blue-600 text-white rounded-lg py-2.5 text-sm font-medium hover:bg-blue-700 disabled:opacity-50"
          x-text="loading ? '登录中...' : '登录'"></button>
      </form>
    </div>
  </div>

  <!-- 管理面板 -->
  <div x-show="token" x-cloak>
    <nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between shadow-sm">
      <h2 class="font-bold text-lg text-gray-800">灵珠手作 · 管理</h2>
      <div class="flex items-center gap-4">
        <span class="text-sm text-gray-400" x-show="tab === 'products'">
          共 <span x-text="totalProducts" class="font-medium text-gray-600"></span> 件商品
        </span>
        <span class="text-sm text-gray-400" x-show="tab === 'users'">
          共 <span x-text="users.length" class="font-medium text-gray-600"></span> 个用户
        </span>
        <button @click="logout" class="text-sm text-red-400 hover:text-red-600">退出</button>
      </div>
    </nav>

    <!-- 标签页切换 -->
    <div class="border-b border-gray-200 bg-white">
      <div class="max-w-7xl mx-auto px-6">
        <div class="flex gap-6">
          <button @click="tab='products'; loadProducts()"
            class="py-3 text-sm font-medium border-b-2 transition -mb-px"
            :class="tab==='products' ? 'text-blue-600 border-blue-600' : 'text-gray-500 border-transparent hover:text-gray-700'">
            商品管理
          </button>
          <button @click="tab='users'; loadUsers()"
            class="py-3 text-sm font-medium border-b-2 transition -mb-px"
            :class="tab==='users' ? 'text-blue-600 border-blue-600' : 'text-gray-500 border-transparent hover:text-gray-700'">
            用户管理
          </button>
          <button @click="tab='userData'; loadUserList()"
            class="py-3 text-sm font-medium border-b-2 transition -mb-px"
            :class="tab==='userData' ? 'text-blue-600 border-blue-600' : 'text-gray-500 border-transparent hover:text-gray-700'">
            用户数据
          </button>
        </div>
      </div>
    </div>

    <!-- ========== 商品管理 Tab ========== -->
    <div x-show="tab === 'products'" class="max-w-7xl mx-auto p-6">
      <div class="flex items-center justify-between mb-4">
        <div class="flex gap-2">
          <input x-model="search" placeholder="搜索名称..."
            class="border border-gray-300 rounded-lg px-3 py-2 text-sm w-48 outline-none focus:border-blue-500">
          <select x-model="filterType"
            class="border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none">
            <option value="">全部类型</option>
            <option value="bead">珠子</option>
            <option value="accessory">配饰</option>
          </select>
          <button @click="page=1; loadProducts()"
            class="bg-gray-100 px-4 py-2 rounded-lg text-sm hover:bg-gray-200">搜索</button>
        </div>
        <button @click="openCreate"
          class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700">+ 新建商品</button>
      </div>

      <div class="bg-white rounded-lg shadow overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-gray-50 border-b">
              <th class="px-4 py-3 text-left text-gray-500 font-medium">ID</th>
              <th class="px-4 py-3 text-left text-gray-500 font-medium">名称</th>
              <th class="px-4 py-3 text-left text-gray-500 font-medium">类型</th>
              <th class="px-4 py-3 text-left text-gray-500 font-medium">类别</th>
              <th class="px-4 py-3 text-left text-gray-500 font-medium">尺寸</th>
              <th class="px-4 py-3 text-right text-gray-500 font-medium">价格</th>
              <th class="px-4 py-3 text-center text-gray-500 font-medium">库存</th>
              <th class="px-4 py-3 text-center text-gray-500 font-medium">状态</th>
              <th class="px-4 py-3 text-center text-gray-500 font-medium">操作</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="p in products" :key="p.id">
              <tr class="border-b border-gray-100 hover:bg-gray-50">
                <td class="px-4 py-3 text-gray-400" x-text="p.id"></td>
                <td class="px-4 py-3 font-medium text-gray-800" x-text="p.name"></td>
                <td class="px-4 py-3 text-gray-600" x-text="p.type === 'bead' ? '珠子' : '配饰'"></td>
                <td class="px-4 py-3 text-gray-600" x-text="p.category"></td>
                <td class="px-4 py-3 text-gray-600" x-text="p.size || '-'"></td>
                <td class="px-4 py-3 text-right text-gray-800 font-medium" x-text="'¥' + (p.price/100).toFixed(2)"></td>
                <td class="px-4 py-3 text-center text-gray-600" x-text="p.stock"></td>
                <td class="px-4 py-3 text-center">
                  <span x-show="p.isActive" class="text-green-600 text-xs bg-green-50 px-2 py-1 rounded-full">上架</span>
                  <span x-show="!p.isActive" class="text-red-500 text-xs bg-red-50 px-2 py-1 rounded-full">下架</span>
                </td>
                <td class="px-4 py-3 text-center">
                  <button @click="openEdit(p)" class="text-blue-500 hover:text-blue-700 text-xs mr-2">编辑</button>
                  <button @click="toggleActive(p)" x-text="p.isActive ? '下架' : '上架'" class="text-yellow-500 hover:text-yellow-700 text-xs mr-2"></button>
                  <button @click="confirmDelete(p)" class="text-red-400 hover:text-red-600 text-xs">删除</button>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
        <div x-show="products.length === 0 && !loading" class="text-center py-12 text-gray-400">暂无数据</div>
        <div x-show="loading" class="text-center py-12 text-gray-400">加载中...</div>
      </div>

      <div class="flex items-center justify-between mt-4 text-sm text-gray-400" x-show="totalPages > 0">
        <span>第 <span x-text="page" class="text-gray-600"></span> 页 / 共 <span x-text="totalPages" class="text-gray-600"></span> 页</span>
        <div class="flex gap-2">
          <button @click="prevPage" :disabled="page<=1"
            class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-100 disabled:opacity-40 disabled:cursor-not-allowed">上一页</button>
          <button @click="nextPage" :disabled="page>=totalPages"
            class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-100 disabled:opacity-40 disabled:cursor-not-allowed">下一页</button>
        </div>
      </div>
    </div>

    <!-- ========== 用户管理 Tab ========== -->
    <div x-show="tab === 'users'" class="max-w-7xl mx-auto p-6">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-base font-semibold text-gray-700">用户列表</h3>
        <button @click="openAddUser"
          class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700">+ 添加用户</button>
      </div>

      <div class="bg-white rounded-lg shadow overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-gray-50 border-b">
              <th class="px-4 py-3 text-left text-gray-500 font-medium">ID</th>
              <th class="px-4 py-3 text-left text-gray-500 font-medium">手机号</th>
              <th class="px-4 py-3 text-left text-gray-500 font-medium">昵称</th>
              <th class="px-4 py-3 text-left text-gray-500 font-medium">注册时间</th>
              <th class="px-4 py-3 text-center text-gray-500 font-medium">操作</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="u in users" :key="u.id">
              <tr class="border-b border-gray-100 hover:bg-gray-50">
                <td class="px-4 py-3 text-gray-400" x-text="u.id"></td>
                <td class="px-4 py-3 font-medium text-gray-800" x-text="u.phone"></td>
                <td class="px-4 py-3 text-gray-600" x-text="u.nickname || '-'"></td>
                <td class="px-4 py-3 text-gray-600" x-text="formatTime(u.createdAt)"></td>
                <td class="px-4 py-3 text-center">
                  <button @click="confirmDeleteUser(u)" class="text-red-400 hover:text-red-600 text-xs">删除</button>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
        <div x-show="users.length === 0 && !loading" class="text-center py-12 text-gray-400">暂无用户</div>
        <div x-show="loading" class="text-center py-12 text-gray-400">加载中...</div>
      </div>
    </div>

    <!-- 添加用户弹窗 -->
    <div x-show="showAddUserModal" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50" @click.self="showAddUserModal=false">
      <div class="bg-white rounded-xl p-6 w-full max-w-sm mx-4 shadow-xl">
        <h3 class="text-lg font-bold text-gray-800 mb-5">添加用户</h3>
        <form @submit.prevent="addUser">
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-600 mb-1">手机号 <span class="text-red-400">*</span></label>
              <input type="tel" x-model="newUserPhone" placeholder="请输入手机号"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none focus:border-blue-500" required>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-600 mb-1">密码 <span class="text-red-400">*</span></label>
              <input type="password" x-model="newUserPassword" placeholder="请输入密码"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none focus:border-blue-500" required>
            </div>
          </div>
          <p x-show="addUserError" class="text-red-500 text-sm mt-3" x-text="addUserError"></p>
          <div class="flex justify-end gap-3 mt-6 pt-4 border-t border-gray-100">
            <button type="button" @click="showAddUserModal=false"
              class="px-4 py-2 border border-gray-300 rounded-lg text-sm text-gray-600 hover:bg-gray-50">取消</button>
            <button type="submit" :disabled="addUserLoading"
              class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700 disabled:opacity-50"
              x-text="addUserLoading ? '添加中...' : '添加'"></button>
          </div>
        </form>
      </div>
    </div>

    <!-- ========== 用户数据 Tab ========== -->
    <div x-show="tab === 'userData'" class="max-w-7xl mx-auto p-6">
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-600 mb-1.5">选择用户</label>
        <select x-model="selectedUserId" @change="loadUserData()"
          class="border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none focus:border-blue-500 min-w-[200px]">
          <option value="">-- 请选择用户 --</option>
          <template x-for="u in userList" :key="u.id">
            <option :value="u.id" x-text="u.phone + (u.nickname ? ' (' + u.nickname + ')' : '')"></option>
          </template>
        </select>
      </div>

      <div x-show="!selectedUserId" class="bg-white rounded-lg shadow p-12 text-center text-gray-400">
        请先选择一个用户
      </div>

      <div x-show="selectedUserId && loadingUserData" class="bg-white rounded-lg shadow p-12 text-center text-gray-400">
        加载中...
      </div>

      <div x-show="selectedUserId && !loadingUserData">
        <!-- 原料（背包） -->
        <div class="mb-6">
          <h3 class="text-base font-semibold text-gray-700 mb-3">🧺 背包 · 原料</h3>
          <div x-show="materials.length === 0" class="text-sm text-gray-400 bg-white rounded-lg shadow p-6 text-center">
            该用户暂无背包原料
          </div>
          <div x-show="materials.length > 0" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
            <template x-for="m in materials" :key="m.materialType">
              <div class="bg-white rounded-lg shadow p-4 border border-gray-100">
                <div class="text-sm font-medium text-gray-800" x-text="m.name || m.materialType"></div>
                <div class="text-xs text-gray-400 mt-0.5" x-text="'类型: ' + m.materialType"></div>
                <div class="mt-2 text-lg font-bold text-blue-600" x-text="m.count + ' 个'"></div>
              </div>
            </template>
          </div>
        </div>

        <!-- 珠子库存 -->
        <div>
          <h3 class="text-base font-semibold text-gray-700 mb-3">📿 珠子库存</h3>
          <div x-show="beads.length === 0" class="text-sm text-gray-400 bg-white rounded-lg shadow p-6 text-center">
            该用户暂无珠子库存
          </div>
          <div x-show="beads.length > 0" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
            <template x-for="b in beads" :key="b.id">
              <div class="bg-white rounded-lg shadow p-4 border border-gray-100">
                <div class="text-sm font-medium text-gray-800" x-text="b.name"></div>
                <div class="text-xs text-gray-400 mt-0.5 space-y-0.5">
                  <div x-text="'材质: ' + (b.materialType || '-')"></div>
                  <div x-text="'品质: ' + (b.quality || '-')"></div>
                </div>
                <div class="mt-2 text-lg font-bold text-purple-600" x-text="b.count + ' 个'"></div>
              </div>
            </template>
          </div>
        </div>
      </div>
    </div>

    <!-- 商品编辑弹窗 -->
    <div x-show="showModal" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50" @click.self="showModal=false">
      <div class="bg-white rounded-xl p-6 w-full max-w-lg mx-4 max-h-[85vh] overflow-y-auto shadow-xl">
        <h3 class="text-lg font-bold text-gray-800 mb-5" x-text="editId ? '编辑商品' : '新建商品'"></h3>
        <form @submit.prevent="saveProduct">
          <div class="space-y-4">
            <div>
              <label class="block text-sm font-medium text-gray-600 mb-1">名称 <span class="text-red-400">*</span></label>
              <input x-model="form.name" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none focus:border-blue-500" required>
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">类型</label>
                <select x-model="form.type" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none">
                  <option value="bead">珠子</option>
                  <option value="accessory">配饰</option>
                </select>
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">类别</label>
                <input x-model="form.category" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none focus:border-blue-500">
              </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">材质</label>
                <input x-model="form.materialType" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none focus:border-blue-500">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">尺寸</label>
                <input x-model="form.size" placeholder="如 8mm" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none focus:border-blue-500">
              </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">价格 (元) <span class="text-red-400">*</span></label>
                <input type="number" step="0.01" x-model="form.price" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none focus:border-blue-500" required>
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-600 mb-1">库存</label>
                <input type="number" x-model="form.stock" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none focus:border-blue-500">
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-600 mb-1">图片 URL</label>
              <input x-model="form.imageUrl" placeholder="如 0.png" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm outline-none focus:border-blue-500">
            </div>
          </div>
          <div class="flex justify-end gap-3 mt-6 pt-4 border-t border-gray-100">
            <button type="button" @click="showModal=false" class="px-4 py-2 border border-gray-300 rounded-lg text-sm text-gray-600 hover:bg-gray-50">取消</button>
            <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700">保存</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    function app() {
      return {
        // ---- 通用 ----
        token: '',
        password: '',
        error: '',
        loading: false,
        tab: 'products',

        // ---- 商品管理 ----
        products: [],
        totalProducts: 0,
        page: 1,
        totalPages: 0,
        search: '',
        filterType: '',
        showModal: false,
        editId: null,
        form: { name: '', type: 'bead', category: '', materialType: '', size: '', price: '', stock: 100, imageUrl: '' },

        // ---- 用户管理 ----
        users: [],
        showAddUserModal: false,
        newUserPhone: '',
        newUserPassword: '',
        addUserLoading: false,
        addUserError: '',

        // ---- 用户数据 ----
        userList: [],
        selectedUserId: '',
        materials: [],
        beads: [],
        loadingUserData: false,

        // ========== 初始化 ==========
        init() {
          const saved = localStorage.getItem('admin_token')
          if (saved) {
            this.token = saved
            this.loadProducts()
          }
        },

        // ========== 认证 ==========
        async login() {
          this.error = ''
          this.loading = true
          await new Promise(r => setTimeout(r, 300))
          if (this.password === 'admin123') {
            this.token = 'admin123'
            localStorage.setItem('admin_token', 'admin123')
            this.loadProducts()
          } else {
            this.error = '密码错误'
          }
          this.loading = false
        },

        logout() {
          this.token = ''
          localStorage.removeItem('admin_token')
        },

        // ========== 日期格式化 ==========
        formatTime(ts) {
          if (!ts) return '-'
          const d = new Date(ts)
          if (isNaN(d.getTime())) return String(ts).slice(0, 10) || '-'
          const y = d.getFullYear()
          const m = String(d.getMonth() + 1).padStart(2, '0')
          const day = String(d.getDate()).padStart(2, '0')
          const h = String(d.getHours()).padStart(2, '0')
          const min = String(d.getMinutes()).padStart(2, '0')
          return y + '-' + m + '-' + day + ' ' + h + ':' + min
        },

        // ========== 商品管理 API ==========
        async loadProducts() {
          this.loading = true
          try {
            let url = '/api/admin/products?page=' + this.page + '&limit=20'
            if (this.filterType) url += '&type=' + this.filterType
            if (this.search) url += '&search=' + encodeURIComponent(this.search)
            const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + this.token } })
            if (res.status === 401) { this.logout(); return }
            const json = await res.json()
            this.products = json.data
            this.totalProducts = json.total
            this.totalPages = Math.ceil(json.total / 20) || 1
          } catch(e) {
            console.error(e)
          } finally {
            this.loading = false
          }
        },

        prevPage() { if (this.page > 1) { this.page--; this.loadProducts() } },
        nextPage() { if (this.page < this.totalPages) { this.page++; this.loadProducts() } },

        openCreate() {
          this.editId = null
          this.form = { name: '', type: 'bead', category: '', materialType: '', size: '', price: '', stock: 100, imageUrl: '' }
          this.showModal = true
        },

        openEdit(p) {
          this.editId = p.id
          this.form = {
            name: p.name,
            type: p.type,
            category: p.category,
            materialType: p.materialType || '',
            size: p.size || '',
            price: (p.price / 100).toFixed(2),
            stock: p.stock,
            imageUrl: p.imageUrl || ''
          }
          this.showModal = true
        },

        async saveProduct() {
          const body = { ...this.form, price: parseFloat(this.form.price) }
          try {
            const url = this.editId ? '/api/admin/products/' + this.editId : '/api/admin/products'
            const method = this.editId ? 'PUT' : 'POST'
            const res = await fetch(url, {
              method,
              headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + this.token },
              body: JSON.stringify(body),
            })
            if (!res.ok) throw new Error(await res.text())
            this.showModal = false
            this.loadProducts()
          } catch(e) { alert('保存失败: ' + e.message) }
        },

        async toggleActive(p) {
          await fetch('/api/admin/products/' + p.id, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + this.token },
            body: JSON.stringify({ isActive: !p.isActive }),
          })
          this.loadProducts()
        },

        async confirmDelete(p) {
          if (!confirm('确认删除 "' + p.name + '" ？')) return
          await fetch('/api/admin/products/' + p.id, {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + this.token },
          })
          this.loadProducts()
        },

        // ========== 用户管理 API ==========
        async loadUsers() {
          this.loading = true
          try {
            const res = await fetch('/api/admin/users', {
              headers: { 'Authorization': 'Bearer ' + this.token }
            })
            if (res.status === 401) { this.logout(); return }
            const json = await res.json()
            this.users = Array.isArray(json) ? json : (json.data || [])
          } catch(e) {
            console.error(e)
          } finally {
            this.loading = false
          }
        },

        openAddUser() {
          this.newUserPhone = ''
          this.newUserPassword = ''
          this.addUserError = ''
          this.showAddUserModal = true
        },

        async addUser() {
          this.addUserLoading = true
          this.addUserError = ''
          try {
            const res = await fetch('/api/admin/users', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + this.token },
              body: JSON.stringify({ phone: this.newUserPhone, password: this.newUserPassword }),
            })
            const json = await res.json()
            if (!res.ok) {
              this.addUserError = json.message || json.error || '添加失败'
              return
            }
            if (json.success === false) {
              this.addUserError = json.message || '添加失败'
              return
            }
            this.showAddUserModal = false
            this.loadUsers()
          } catch(e) {
            this.addUserError = '网络错误: ' + e.message
          } finally {
            this.addUserLoading = false
          }
        },

        async confirmDeleteUser(u) {
          if (!confirm('确认删除用户 "' + (u.phone || u.id) + '" ？\n此操作不可恢复。')) return
          try {
            const res = await fetch('/api/admin/users/' + u.id, {
              method: 'DELETE',
              headers: { 'Authorization': 'Bearer ' + this.token },
            })
            if (!res.ok) {
              const json = await res.json()
              alert('删除失败: ' + (json.message || json.error || res.statusText))
              return
            }
            this.loadUsers()
          } catch(e) {
            alert('网络错误: ' + e.message)
          }
        },

        // ========== 用户数据 API ==========
        async loadUserList() {
          this.selectedUserId = ''
          this.materials = []
          this.beads = []
          try {
            const res = await fetch('/api/admin/users', {
              headers: { 'Authorization': 'Bearer ' + this.token }
            })
            if (res.status === 401) { this.logout(); return }
            const json = await res.json()
            this.userList = Array.isArray(json) ? json : (json.data || [])
          } catch(e) {
            console.error(e)
          }
        },

        async loadUserData() {
          if (!this.selectedUserId) {
            this.materials = []
            this.beads = []
            return
          }
          this.loadingUserData = true
          try {
            const [matRes, beadRes] = await Promise.all([
              fetch('/api/admin/users/' + this.selectedUserId + '/materials', {
                headers: { 'Authorization': 'Bearer ' + this.token }
              }),
              fetch('/api/admin/users/' + this.selectedUserId + '/beads', {
                headers: { 'Authorization': 'Bearer ' + this.token }
              })
            ])
            if (matRes.status === 401 || beadRes.status === 401) { this.logout(); return }

            const matJson = await matRes.json()
            const beadJson = await beadRes.json()

            this.materials = Array.isArray(matJson) ? matJson : (matJson.data || [])
            this.beads = Array.isArray(beadJson) ? beadJson : (beadJson.data || [])
          } catch(e) {
            console.error(e)
            this.materials = []
            this.beads = []
          } finally {
            this.loadingUserData = false
          }
        }
      }
    }
  </script>
  <style>[x-cloak] { display: none !important; }</style>
</body>
</html>
